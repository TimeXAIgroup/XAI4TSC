# =============================================================================
# ucr_benchmark.yaml — sweep the full UCR univariate archive.
#
#     python -m experiment_runner.main --conf experiment_runner/configs/ucr_benchmark.yaml
#
# Deliberately minimal so a full 128-dataset sweep stays tractable: the smallest
# built-in model (LeNet) with a single cheap gradient explainer and the cheapest
# metric. Datasets are downloaded once into cache_path and reused.
# =============================================================================
experiment_name: "ucr_benchmark"

general:
  device: "use_available"
  reproducible: true
  seed: 42

data_config:
  default_settings:
    train_split: 0.8
    val_split: 0.1
    encode: "label"
    allow_padding: true       # zero-pad variable-length series to the longest length
    allow_imputation: true    # impute NaN values with the per-channel mean
  datasets:
    - dataset: "UCR"          # expands to all 128 UCR univariate datasets

train_config:
  default_settings:
    train: "till_epoch"
    hyperparams:
      epochs: 10
      batchsize: 8
      loss_func: "CrossEntropy"
      optimizer: "adam"
      learn_rate: 0.001
      patience: 10
      save_best: true
  models:
    - model: "LeNet"          # smallest built-in model
      init_params:
        in_channels: null     # auto-detected per dataset
        num_classes: null     # auto-detected per dataset

explanation_config:
  default_settings:
    target: "predicted"
    samples:
      type: "random"
      count: 10
  explainers:
    - method: Integrated_Gradients    # single cheap gradient explainer
      n_steps: 10                     # more steps make the attribution more accurate

evaluation_config:
  default_settings:
    metric_class_params:
      normalise: true
      abs: true
      disable_warnings: true
      return_aggregate: true
    metric_call_params:
      softmax: false
  metrics:
    - metric: "Complexity"           # cheapest metric (no perturbation loop)

results_rel_path: "./experiments/results/"
cache_path: "./cache/"
