# Minimal integration test config.
# Three placeholder strings are replaced at test runtime:
#   __CACHE_PATH__   → actual cache directory path
#   __RESULTS_PATH__ → temporary results directory path

experiment_name: "test_run"

cache_path: "__CACHE_PATH__"

general:
  reproducible: true
  seed: 42
  device: "cpu"

data_config:
  default_settings:
    train_split: 0.8
    val_split: 0.1
    channels: 1
    classes: 2
    length: 150
    encode: "label"
    format: "numpy"
    download: true
    path: null
    is_presplit: false
  datasets:
    - dataset: "GunPoint"
      channels: 1
      classes: 2
      length: 150
      train_split: 0.8
      val_split: 0.1

train_config:
  default_settings:
    hyperparams:
      epochs: 2
      batchsize: 8
      loss_func: "CrossEntropy"
      optimizer: "adam"
      learn_rate: 0.001
      patience: 2
      save_best: true
    train: "till_epoch"
  models:
    - model: "FCN"
      init_params:
        in_channels: 1
        num_classes: 2

explanation_config:
  default_settings:
    target: "predicted"
    visualization_type:
      - "bubbles"
    samples:
      type: "by_index"
      indices: [0, 1]
      count: 5
    save_exp_values: false
  explainers:
    - method: "Integrated_Gradients"

evaluation_config:
  default_settings:
    metric_class_params:
      normalise: true
      abs: true
      disable_warnings: true
      display_progressbar: false
      return_aggregate: true
    metric_call_params:
      softmax: false
  metrics:
    - metric: "Complexity"

results_rel_path: "__RESULTS_PATH__"
